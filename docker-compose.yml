version: '3.8'

services:
  redis:
    image: redis:7
    container_name: transitscore_redis
    ports:
      - "6379:6379"
    restart: always

  otp:
    image: docker.io/opentripplanner/opentripplanner:2.6.0
    container_name: transitscore_otp
    ports:
      - "8080:8080"
    volumes:
      - ./otp-data:/var/opentripplanner
    command: ["--load", "--serve"]
    mem_limit: 4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/otp/routers/default || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

  backend:
    build: ./backend
    container_name: transitscore_backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      OTP_URL: http://otp:8080
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/data
    depends_on:
      - redis
      - otp
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: transitscore_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001
    depends_on:
      - backend
    restart: unless-stopped


version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: transitscore_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: transitscore
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  redis:
    image: redis:7
    container_name: transitscore_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  mysql_data:
